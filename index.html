<html>
<head>
  <title>WebAssembly demo</title>
</head>
<body>
  <p>fib(30) = <span id="fib30">???</span></p>

  <script>
    async function run() {
      const { instance } = await WebAssembly.instantiateStreaming(fetch("fib.wasm"));
      console.dir(instance.exports);
      document.getElementById("fib30").textContent = instance.exports.fib(30);
    }
    run();
  </script>
</body>
</html>
